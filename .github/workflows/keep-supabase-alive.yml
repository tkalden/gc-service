name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — well within the 7-day pause window
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Supabase returned unexpected status: $STATUS"
            exit 1
          fi
